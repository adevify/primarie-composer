# Public HTTPS termination is intentionally handled by the future main server
# proxy for *.prmr.md. This local environment proxy receives plain HTTP on the
# assigned 127.0.0.1 port and relies on the original Host header to route
# traffic to services inside this isolated Docker Compose project.

server {
  listen 80;
  server_name ~^admin\.[^.]+\..+$;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://admin;
  }
}

server {
  listen 80;
  server_name ~^api\.[^.]+\..+$;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://api;
  }
}

server {
  listen 80 default_server;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://web;
  }
}
