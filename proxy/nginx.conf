events {}

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  server {
    listen 80;
    server_name _;

    auth_request /__composer_authorize;
    auth_request_set $environment_key $upstream_http_x_environment_key;
    auth_request_set $environment_port $upstream_http_x_environment_port;
    auth_request_set $upstream_host $upstream_http_x_upstream_host;

    location = /__composer_authorize {
      internal;
      auth_request off;
      proxy_pass http://api/proxy/authorize;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Original-URI $request_uri;
    }

    location = /health {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /environments {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Environment-Key $environment_key;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://$upstream_host:$environment_port;
    }
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl/ssl.key;
    ssl_trusted_certificate /etc/nginx/ssl/ssl.bundle;

    auth_request /__composer_authorize;
    auth_request_set $environment_key $upstream_http_x_environment_key;
    auth_request_set $environment_port $upstream_http_x_environment_port;
    auth_request_set $upstream_host $upstream_http_x_upstream_host;

    location = /__composer_authorize {
      internal;
      auth_request off;
      proxy_pass http://api/proxy/authorize;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Original-URI $request_uri;
    }

    location = /health {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /environments {
      auth_request off;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Original-Host $host;
      proxy_set_header X-Environment-Key $environment_key;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://$upstream_host:$environment_port;
    }
  }
}
