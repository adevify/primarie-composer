services:
  api:
    build:
      context: ./apps/api
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - mongo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime:/app/runtime
      - ./templates:/app/templates
      - ./seeds:/app/seeds
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/primarie_envforge
      MONGO_DB_NAME: primarie_envforge
      RUNTIME_DIR: /app/runtime/environments
      TEMPLATE_DIR: /app/templates/environment
      SEEDS_DIR: /app/seeds

  mongo:
    image: mongo:7
    command: ["mongod", "--quiet"]
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"

volumes:
  mongo-data:
