services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: mongo:7.0.12
    command: ["mongod", "--quiet"]
    volumes:
      - ./runtime/db:/data/db
    logging:
      driver: "none"

  api:
    build:
      context: ./apps/api
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runtime:/app/runtime
      - ./seeds:/app/seeds
      - /opt/composer-bus:/bus
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      SOURCE_REPO_URL: ${SOURCE_REPO_URL:-git@github.com:org/repo.git}
      BASE_ENV_PORT: ${BASE_ENV_PORT:-8001}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-prmr.md}
      PROXY_UPSTREAM_HOST: ${PROXY_UPSTREAM_HOST:-auto}
      RUNTIME_DIR: /app/runtime/environments
      HOST_RUNTIME_DIR: ${HOST_RUNTIME_DIR:-/opt/primarie-composer/runtime/environments}
      ENVIRONMENTS_FILE: /app/runtime/environments.json
      SEEDS_DIR: /app/seeds
      HOST_SEEDS_DIR: ${HOST_SEEDS_DIR:-/opt/primarie-composer/seeds}
      BUS_PIPE_PATH: /bus/actions.pipe
      BUS_RESULTS_DIR: /bus/results
      BUS_LOGS_DIR: /bus/logs
      BUS_WORKER_READY_PATH: /bus/worker.ready
      SSH_AUTH_SOCK: /ssh-agent
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
